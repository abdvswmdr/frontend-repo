<!-- *** TOPBAR ***
_________________________________________________________ -->
<div id="announcement-bar" style="display:none;">
    <div class="container" style="position:relative;">
        <span id="announcement-text">
            <strong>Free shipping</strong> on orders over KSh 5,000 &nbsp;·&nbsp;
            Kenya's premier embedded systems store &nbsp;·&nbsp;
            <a href="category.html" style="color:#fff;text-decoration:underline;">Shop new arrivals</a>
        </span>
        <button id="announcement-close" onclick="dismissAnnouncement()" title="Dismiss">&#x2715;</button>
    </div>
</div>
<div id="top">
    <div class="container">
        <div class="col-md-8 offer" data-animate="fadeInDown">
            <a href="category.html" class="btn btn-success btn-sm"
               data-animate-hover="shake">New Arrivals</a> <a href="category.html">Kenya's premier embedded systems store</a>
        </div>
        <div class="col-md-4" data-animate="fadeInDown">
            <ul class="menu">
                <li>
                    <select id="currency-select" onchange="soqoniSetCurrency(this.value)" title="Currency">
                        <option value="USD">$ USD</option>
                        <option value="KES">KSh KES</option>
                        <option value="EUR">€ EUR</option>
                    </select>
                </li>
                <li id="login"><a href="#" data-toggle="modal" data-target="#login-modal">Login</a></li>
                <li id="howdy"></li>
                <li id="logout"><a href="index.html" onclick="logout()">Logout</a></li>
                <li id="register"><a href="#" data-toggle="modal" data-target="#register-modal">Register</a></li>
            </ul>
        </div>
    </div>
    <div class="modal fade" id="login-modal" tabindex="-1" role="dialog"
         aria-labelledby="Login" aria-hidden="true">
        <div class="modal-dialog modal-sm">

            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal"
                            aria-hidden="true">&times;</button>
                    <h4 class="modal-title" id="Login">Customer login</h4>
                </div>
                <div class="modal-body">

                    <div id="login-message"> </div>

                    <form action="index.html" method="get">
                        <div class="form-group">
                            <input type="text" class="form-control"
                                   name="username"
                                   id="username-modal" placeholder="username">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control"
                                   name="password"
                                   id="password-modal" placeholder="password">
                        </div>

                        <p class="text-center">
                            <button class="btn btn-primary" href="#" onclick="return login()"><i
                                    class="fa fa-sign-in"></i> Log in
                            </button>
                        </p>

                    </form>

                    <!--<p class="text-center text-muted">Not registered yet?</p>-->
                    <!--<p class="text-center text-muted"><a href="register.html"><strong>Register now</strong></a>! It is easy and done in 1&nbsp;minute and gives you access to special discounts and much more!</p>-->

                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="register-modal" tabindex="-1" role="dialog"
         aria-labelledby="Register" aria-hidden="true">
        <div class="modal-dialog modal-sm">

            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal"
                            aria-hidden="true">&times;</button>
                    <h4 class="modal-title" id="Login">Register</h4>
                </div>
                <div class="modal-body">

                    <div id="registration-message"> </div>

                    <form action="index.html" method="get">

                        <div class="form-group">
                            <label for="name">Username</label>
                            <input type="text" class="form-control" name="username"
			    	id="register-username-modal" placeholder="username"required>
                        </div>
                        <div class="form-group">
                            <label for="first-name">First name</label>
                            <input type="text" class="form-control" name="first-name"
			    	id="register-first-modal" placeholder="first name" required>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last name</label>
                            <input type="text" class="form-control" name="last-name"
			    	id="register-last-modal" placeholder="last name"required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="text" class="form-control" name="email"
			    	id="register-email-modal" placeholder="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" name="password"
			    	id="register-password-modal"required>
                        </div>
                        <p class="text-center">
                            <button class="btn btn-primary" href="#" onclick="return register()"><i
                                    class="fa fa-sign-in"></i> Register
                            </button>
                        </p>

                    </form>

                    <!--<p class="text-center text-muted">Not registered yet?</p>-->
                    <!--<p class="text-center text-muted"><a href="register.html"><strong>Register now</strong></a>! It is easy and done in 1&nbsp;minute and gives you access to special discounts and much more!</p>-->

                </div>
            </div>
        </div>
    </div>

</div>

<!-- *** TOP BAR END *** -->

<script>

    // --- Currency helpers (global, used by index/category/detail) ---
    var CURRENCY_SYMBOLS = { USD: '$', KES: 'KSh ', EUR: '€' };

    function soqoniGetCurrency() {
        return localStorage.getItem('soqoniCurrency') || 'KES';
    }

    function soqoniSetCurrency(val) {
        localStorage.setItem('soqoniCurrency', val);
        location.reload();
    }

    function soqoniSymbol() {
        return CURRENCY_SYMBOLS[soqoniGetCurrency()] || '$';
    }

    // Expose globally so other page scripts can call them
    window.soqoniGetCurrency = soqoniGetCurrency;
    window.soqoniSetCurrency = soqoniSetCurrency;
    window.soqoniSymbol      = soqoniSymbol;

    $(document).ready(function () {
        $.ajaxSetup({
            contentType: "application/json; charset=utf-8"
        });

        // Set dropdown to stored value immediately on topbar load
        var stored = localStorage.getItem('soqoniCurrency') || 'KES';
        $('#currency-select').val(stored);

        if ($.cookie('logged_in') != null && $.cookie('logged_in') != "") {

            username($.cookie('logged_in'), function (username) {
                if (typeof username !== 'undefined') {
                    $("#login").remove();
                    $("#register").remove();
                    $("#howdy").append('<a href="#">Logged in as ' + username + '<\/a>').hide().fadeIn(200);
                    $("#logout").hide().fadeIn(200);
                } else {
                    $("#howdy").remove()
                    $("#logout").remove()
                }
            });
        } else {
            $("#howdy").remove()
            $("#logout").remove()
        }

    })

    // Announcement bar — show unless user dismissed
    function dismissAnnouncement() {
        localStorage.setItem('announcementDismissed', '1');
        document.getElementById('announcement-bar').style.display = 'none';
    }

    if (localStorage.getItem('announcementDismissed') !== '1') {
        document.getElementById('announcement-bar').style.display = 'block';
    }
</script>

<style>
#announcement-bar {
    background: #c0392b;
    color: #fff;
    text-align: center;
    padding: 7px 0;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    position: relative;
}
#announcement-bar a { color: #fff; }
#announcement-close {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
}
#announcement-close:hover { color: #fff; }

#currency-select {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 12px;
    padding: 1px 4px;
    border-radius: 3px;
    cursor: pointer;
    vertical-align: middle;
}
#currency-select option { color: #333; background: #fff; }
</style>
