<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="robots" content="all,follow">
    <meta name="googlebot" content="index,follow,snippet,archive">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Soqoni Demo App">
    <meta name="author" content="Ondrej Svestka | ondrejsvestka.cz">
    <meta name="keywords" content="">

    <title>
        Soqoni
    </title>

    <meta name="keywords" content="">

    <link href='https://fonts.googleapis.com/css?family=Roboto:400,500,700,300,100'
          rel='stylesheet' type='text/css'>

    <!-- styles -->
    <link href="css/font-awesome.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/animate.min.css" rel="stylesheet">
    <link href="css/owl.carousel.css" rel="stylesheet">
    <link href="css/owl.theme.css" rel="stylesheet">

    <!-- theme stylesheet -->
    <link href="css/style.blue.css" rel="stylesheet" id="theme-stylesheet">

    <!-- your stylesheet with modifications -->
    <link href="css/custom.css" rel="stylesheet">

    <script src="js/respond.min.js"></script>

    <link rel="shortcut icon" href="favicon.png">


</head>

<body>

<div id="topbar"></div>
<div id="navbar"></div>

<div id="all">

    <div id="content">
        <div class="container">

            <div class="col-md-12">
                <ul class="breadcrumb" id="detail-breadcrumb">
                    <li><a href="/">Home</a></li>
                    <li><a href="category.html">Catalogue</a></li>
                </ul>

            </div>

            <div class="col-md-12">

                <div class="row" id="productMain">
                    <div class="col-sm-6">
                        <div id="mainImage">
                            <img id="imageMain" alt=""
                                 class="img-responsive">
                        </div>

                        <div id="thumbs"></div>
                    </div>
                    <div class="col-sm-6">
                        <div class="box">
                            <h1 id="title"></h1>
                            <div id="detail-rating" style="color:#f5a623; font-size:18px; margin-bottom:4px;">★★★★★ <small class="text-muted" style="font-size:12px;" id="rating-count"></small></div>
                            <p id="price" class="price" style="font-size:22px; margin:6px 0;"></p>
                            <p id="availability" style="margin:4px 0; font-size:13px;"></p>

                            <div class="qty-row" style="display:flex; align-items:center; gap:8px; margin:10px 0;">
                                <button class="btn btn-default btn-sm" id="qty-minus" onclick="changeQty(-1)">−</button>
                                <input type="number" id="qty-input" value="1" min="1" class="form-control" style="width:55px; text-align:center; padding:4px;">
                                <button class="btn btn-default btn-sm" id="qty-plus" onclick="changeQty(1)">+</button>
                            </div>

                            <p class="buttons">
                                <a id="buttonCart" class="btn btn-primary"><i
                                        class="fa fa-shopping-cart"></i> Add to cart</a>
                                <a id="buttonWishlist" href="#" class="btn btn-default"><i
                                        class="fa fa-heart"></i> Add to wishlist</a>
                            </p>
                        </div>
                    </div>

                </div>


                <div class="box" id="productDetails">
                    <p>
                    <h4>Product details</h4>
                    <p id="description"></p>
                    <hr>
                    <div class="social">
                        <h4>Show it to your friends</h4>
                        <p>
                            <a href="#" class="external facebook"
                               data-animate-hover="pulse"><i
                                    class="fa fa-facebook"></i></a>
                            <a href="#" class="external gplus"
                               data-animate-hover="pulse"><i
                                    class="fa fa-google-plus"></i></a>
                            <a href="#" class="external twitter"
                               data-animate-hover="pulse"><i
                                    class="fa fa-twitter"></i></a>
                            <a href="#" class="email"
                               data-animate-hover="pulse"><i
                                    class="fa fa-envelope"></i></a>
                        </p>
                    </div>
                </div>

                <div id="related-section">
                    <div class="section-header">
                        <h2>You May Also Like</h2>
                    </div>
                    <div id="related-products"></div>
                </div>

            </div>
            <!-- /.col-md-9 -->
        </div>
        <!-- /.container -->
    </div>
    <!-- /#content -->

    <div id="footer"></div>
</div>
<!-- /#all -->


<!-- *** SCRIPTS TO INCLUDE ***
_________________________________________________________ -->
<script src="js/jquery-1.11.0.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/jquery.cookie.js"></script>
<script src="js/waypoints.min.js"></script>
<script src="js/modernizr.js"></script>
<script src="js/bootstrap-hover-dropdown.js"></script>
<script src="js/owl.carousel.min.js"></script>
<script src="js/front.js"></script>
<script src="js/jquery.query-object.js"></script>
<script src="js/client.js"></script>
<script>

    $(document).ready(function () {
        $.ajaxSetup({
            contentType: "application/json; charset=utf-8"
        });

        console.log("Loading components for category.html");
        $("#topbar").load("topbar.html");
        $("#navbar").load("navbar.html");
        $("#footer").load("footer.html");

        var id = $.query.get('id') ? $.query.get('id') : "";
        if (id == null || id == "") {
            document.location.href = "/";
        }
        var CURRENCY_SYMBOLS = { USD: '$', KES: 'KSh ', EUR: '€' };
        var currency = localStorage.getItem('soqoniCurrency') || 'USD';
        var symbol   = CURRENCY_SYMBOLS[currency] || '$';

        var productCount = 1;
        window.changeQty = function(delta) {
            var max = window._stockCount || 99;
            productCount = Math.max(1, Math.min(max, productCount + delta));
            $('#qty-input').val(productCount);
        };
        $('#qty-input').on('change', function() {
            var max = window._stockCount || 99;
            productCount = Math.max(1, Math.min(max, parseInt($(this).val()) || 1));
            $(this).val(productCount);
        });

        $.getJSON('/catalogue/' + id, {currency: currency}, function (data) {
            $("#title").text(data.name);
            $("#price").text(symbol + data.price.toFixed(2));
            $("#imageMain").attr("src", data.imageUrl[0]);

            // Breadcrumb: Home > Catalogue > [tag] > Product name
            var tag = data.tag && data.tag[0] ? data.tag[0] : null;
            if (tag) {
                $('#detail-breadcrumb').append('<li><a href="category.html?tags=' + encodeURIComponent(tag) + '">' + tag + '</a></li>');
            }
            $('#detail-breadcrumb').append('<li>' + data.name + '</li>');

            // Rating count proxy (use count as a stand-in)
            var reviews = data.count ? Math.min(data.count * 3, 999) : 0;
            if (reviews > 0) $('#rating-count').text(reviews + ' ratings');

            // Availability
            window._stockCount = data.count;
            if (data.count > 0) {
                $('#availability').html('<span style="color:#27ae60;"><i class="fa fa-check-circle"></i> In Stock</span> <span class="text-muted">(' + data.count + ' units)</span>');
                $('#qty-plus').prop('disabled', false);
            } else {
                $('#availability').html('<span style="color:#c0392b;"><i class="fa fa-times-circle"></i> Out of Stock</span>');
                $('#buttonCart').addClass('disabled').attr('onclick', null);
                $('#qty-minus, #qty-plus, #qty-input').prop('disabled', true);
            }

            $("#buttonCart").attr("onClick", "addToCart(\'" + data.id + "\', parseInt($('#qty-input').val()))");
            var wl = JSON.parse(localStorage.getItem('soqoniWishlist') || '[]');
            if (wl.indexOf(data.id) > -1) {
                $("#buttonWishlist").html('<i class="fa fa-heart"></i> In wishlist').addClass('active');
            }
            $("#buttonWishlist").on('click', function(e) {
                e.preventDefault();
                var list = JSON.parse(localStorage.getItem('soqoniWishlist') || '[]');
                var idx  = list.indexOf(data.id);
                if (idx > -1) {
                    list.splice(idx, 1);
                    $(this).html('<i class="fa fa-heart"></i> Add to wishlist').removeClass('active');
                } else {
                    list.push(data.id);
                    $(this).html('<i class="fa fa-heart"></i> In wishlist').addClass('active');
                }
                localStorage.setItem('soqoniWishlist', JSON.stringify(list));
            });
            var thumbHtml = "";
            for (var i = 0; i < data.imageUrl.length; i++) {
                thumbHtml = thumbHtml +
                        '<div class="col-xs-4">\
                            <a href="' + data.imageUrl[i] + '" class="thumb">\
                    <img src="' + data.imageUrl[i] + '" alt="" class="img-responsive">\
                    </a>\
                </div>'
            }
            $("#thumbs").append(thumbHtml);
            // Format description as bullet list (sentences split on ". ")
            var parts = (data.description || '').split(/\.\s+/).filter(function(s){ return s.trim(); });
            if (parts.length > 1) {
                var items = parts.map(function(s){ return '<li>' + s.trim().replace(/\.$/, '') + '</li>'; }).join('');
                $("#description").html('<ul class="product-spec-list">' + items + '</ul>');
            } else {
                $("#description").text(data.description);
            }

            // Related products — same card style as homepage, 5-column grid
            $.getJSON('/catalogue', {sort: "id", size: 6, tags: data.tag[0], currency: currency}, function (relData) {
                if (relData != null) {
                    $.each(relData, function (index, element) {
                        if (element.id === id) return; // skip current product
                        $('#related-products').append(
                            '<div class="col-product">' +
                            '<div class="product">' +
                            '<div class="product-img-wrap">' +
                            '<a href="detail.html?id=' + element.id + '">' +
                            '<img src="' + element.imageUrl[0] + '" alt="' + element.name + '">' +
                            '</a>' +
                            '<div class="hover-cart">' +
                            '<a href="#" onclick="addToCart(\'' + element.id + '\');return false;" class="btn">' +
                            '<i class="fa fa-shopping-cart"></i> Add to cart</a>' +
                            '</div>' +
                            '</div>' +
                            '<div class="text">' +
                            '<div class="product-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>' +
                            '<h3><a href="detail.html?id=' + element.id + '">' + element.name + '</a></h3>' +
                            '<p class="price">' + symbol + element.price.toFixed(2) + '</p>' +
                            '</div>' +
                            '</div>' +
                            '</div>'
                        );
                    });
                }
            });
        });






    });

</script>

</body>

</html>
