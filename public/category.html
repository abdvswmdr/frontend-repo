<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="robots" content="all,follow">
    <meta name="googlebot" content="index,follow,snippet,archive">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Soqoni Demo App">
    <meta name="author" content="Abdulswamad Rama | soqoni.tech">
    <meta name="keywords" content="">

    <title>
        soqoni
    </title>

    <meta name="keywords" content="">

    <link href='https://fonts.googleapis.com/css?family=Roboto:400,500,700,300,100'
          rel='stylesheet' type='text/css'>

    <!-- styles -->
    <link href="css/font-awesome.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/animate.min.css" rel="stylesheet">
    <link href="css/owl.carousel.css" rel="stylesheet">
    <link href="css/owl.theme.css" rel="stylesheet">

    <!-- theme stylesheet -->
    <link href="css/style.blue.css" rel="stylesheet" id="theme-stylesheet">

    <!-- your stylesheet with modifications -->
    <link href="css/custom.css" rel="stylesheet">

    <script src="js/respond.min.js"></script>

    <link rel="shortcut icon" href="favicon.png">


</head>

<body>

<div id="topbar"></div>
<div id="navbar"></div>

<div id="all">

    <div id="content">
        <div class="container">

            <div class="col-md-12">
                <ul class="breadcrumb" id="cat-breadcrumb">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="category.html">Catalogue</a></li>
                </ul>
            </div>

            <div class="col-md-2" style="padding-left:0;">
                <!-- *** MENUS AND FILTERS ***
_________________________________________________________ -->
                <div class="panel panel-default sidebar-menu">

                    <div class="panel-heading">
                        <h3 class="panel-title">Filters <a
                                class="btn btn-xs btn-danger pull-right"
                                href="#" onclick='resetTags()'><i class="fa fa-times-circle"></i>
                            Clear</a></h3>
                    </div>

                    <div class="panel-body">

                        <form id="filters-form">
                            <div id="filters" class="form-group">
                            </div>

                            <a class="btn btn-default btn-sm btn-primary" href="#"
                               onclick='setNewTags($("input:checkbox:checked").map(function () {return this.value;}).get().join(","));'>
                                <i class="fa fa-pencil"></i> Apply
                            </a>

                        </form>

                    </div>
                </div>

                <!-- *** MENUS AND FILTERS END *** -->
            </div>

            <div class="col-md-10">
                <div style="display:flex; justify-content:flex-end; align-items:center; margin-bottom:8px; padding:4px 0;">
                    <strong style="font-size:12px; margin-right:6px;">Sort by</strong>
                    <select name="sort-by" id="sort-select" class="form-control input-sm" style="display:inline-block;width:auto;">
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="name">Name A–Z</option>
                    </select>
                </div>

                <!-- *** PRODUCTS *** -->

                <div class="row">
                    <div id="products"></div>
                </div>
                <!-- /.products -->

                <div class="pages" style="display:flex; align-items:center; justify-content:space-between; margin-top:10px;">
                    <ul id="pagination" class="pagination" style="margin:0;"></ul>
                    <small id="totalProducts" class="text-muted" style="white-space:nowrap;"></small>
                </div>


            </div>
            <!-- /.col-md-9 -->
        </div>
        <!-- /.container -->
    </div>
    <!-- /#content -->
    <div id="footer"></div>
</div>
<!-- /#all -->


<!-- *** SCRIPTS TO INCLUDE ***
_________________________________________________________ -->
<script src="js/jquery-1.11.0.min.js"></script>

<script src="js/modernizr.js"></script>
<script src="js/bootstrap-hover-dropdown.js"></script>
<script src="js/owl.carousel.min.js"></script>
<script src="js/front.js"></script>
<script src="js/jquery.query-object.js"></script>
<script src="js/client.js"></script>
<script src="js/category-page.js"></script>


</body>

</html>
