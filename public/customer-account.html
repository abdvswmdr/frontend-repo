<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Soqoni - My Account">
    <title>Soqoni — My Account</title>
    <link href='https://fonts.googleapis.com/css?family=Roboto:400,500,700,300,100' rel='stylesheet'>
    <link href="css/font-awesome.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/animate.min.css" rel="stylesheet">
    <link href="css/owl.carousel.css" rel="stylesheet">
    <link href="css/owl.theme.css" rel="stylesheet">
    <link href="css/style.blue.css" rel="stylesheet" id="theme-stylesheet">
    <link href="css/custom.css" rel="stylesheet">
    <script src="js/respond.min.js"></script>
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>

<div id="topbar"></div>
<div id="navbar"></div>

<div id="all">
    <div id="content">
        <div class="container">

            <div class="col-md-12">
                <ul class="breadcrumb">
                    <li><a href="index.html">Home</a></li>
                    <li>My account</li>
                </ul>
            </div>

            <div class="col-md-3">
                <div class="panel panel-default sidebar-menu">
                    <div class="panel-heading">
                        <h3 class="panel-title">Customer section</h3>
                    </div>
                    <div class="panel-body">
                        <ul class="nav nav-pills nav-stacked">
                            <li><a href="customer-orders.html"><i class="fa fa-list"></i> My orders</a></li>
                            <li><a href="customer-wishlist.html"><i class="fa fa-heart"></i> My wishlist</a></li>
                            <li class="active"><a href="customer-account.html"><i class="fa fa-user"></i> My account</a></li>
                            <li><a href="index.html" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="box">
                    <h1>My account</h1>
                    <p class="lead">Change your personal details or password.</p>

                    <div id="account-message"></div>

                    <!-- Personal details -->
                    <h3>Personal details</h3>
                    <form id="form-profile" onsubmit="return saveProfile()">
                        <div class="row">
                            <div class="col-sm-6">
                                <div class="form-group">
                                    <label>Username <small class="text-muted">(cannot be changed)</small></label>
                                    <input type="text" class="form-control" id="username" readonly>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control" id="email">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <label>First name</label>
                                    <input type="text" class="form-control" id="firstname">
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <label>Last name</label>
                                    <input type="text" class="form-control" id="lastname">
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <label>Gender <small class="text-muted">(optional)</small></label>
                                    <select class="form-control" id="gender">
                                        <option value="">— Select —</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                        <option value="prefer_not">Prefer not to say</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6">
                                <div class="form-group">
                                    <label>Phone <small class="text-muted">(optional)</small></label>
                                    <input type="tel" class="form-control" id="phone" placeholder="+254 7XX XXX XXX">
                                </div>
                            </div>
                        </div>

                        <hr>
                        <h4>Shipping address <small class="text-muted">(all optional)</small></h4>

                        <div class="row">
                            <div class="col-sm-12">
                                <div class="form-group">
                                    <label>Street / Building / Estate</label>
                                    <input type="text" class="form-control" id="street" placeholder="e.g. Tom Mboya Street, Jomvu Plaza">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6">
                                <div class="form-group">
                                    <label>County</label>
                                    <select class="form-control" id="county" onchange="populateTowns()">
                                        <option value="">— Select county —</option>
                                        <option value="Baringo">Baringo</option>
                                        <option value="Bomet">Bomet</option>
                                        <option value="Bungoma">Bungoma</option>
                                        <option value="Busia">Busia</option>
                                        <option value="Elgeyo/Marakwet">Elgeyo/Marakwet</option>
                                        <option value="Embu">Embu</option>
                                        <option value="Garissa">Garissa</option>
                                        <option value="Homa Bay">Homa Bay</option>
                                        <option value="Isiolo">Isiolo</option>
                                        <option value="Kajiado">Kajiado</option>
                                        <option value="Kakamega">Kakamega</option>
                                        <option value="Kericho">Kericho</option>
                                        <option value="Kiambu">Kiambu</option>
                                        <option value="Kilifi">Kilifi</option>
                                        <option value="Kirinyaga">Kirinyaga</option>
                                        <option value="Kisii">Kisii</option>
                                        <option value="Kisumu">Kisumu</option>
                                        <option value="Kitui">Kitui</option>
                                        <option value="Kwale">Kwale</option>
                                        <option value="Laikipia">Laikipia</option>
                                        <option value="Lamu">Lamu</option>
                                        <option value="Machakos">Machakos</option>
                                        <option value="Makueni">Makueni</option>
                                        <option value="Mandera">Mandera</option>
                                        <option value="Marsabit">Marsabit</option>
                                        <option value="Meru">Meru</option>
                                        <option value="Migori">Migori</option>
                                        <option value="Mombasa">Mombasa</option>
                                        <option value="Murang'a">Murang'a</option>
                                        <option value="Nairobi City">Nairobi City</option>
                                        <option value="Nakuru">Nakuru</option>
                                        <option value="Nandi">Nandi</option>
                                        <option value="Narok">Narok</option>
                                        <option value="Nyamira">Nyamira</option>
                                        <option value="Nyandarua">Nyandarua</option>
                                        <option value="Nyeri">Nyeri</option>
                                        <option value="Samburu">Samburu</option>
                                        <option value="Siaya">Siaya</option>
                                        <option value="Taita/Taveta">Taita/Taveta</option>
                                        <option value="Tana River">Tana River</option>
                                        <option value="Tharaka-Nithi">Tharaka-Nithi</option>
                                        <option value="Trans Nzoia">Trans Nzoia</option>
                                        <option value="Turkana">Turkana</option>
                                        <option value="Uasin Gishu">Uasin Gishu</option>
                                        <option value="Vihiga">Vihiga</option>
                                        <option value="Wajir">Wajir</option>
                                        <option value="West Pokot">West Pokot</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="form-group">
                                    <label>City / Town</label>
                                    <select class="form-control" id="city-select">
                                        <option value="">— Select county first —</option>
                                    </select>
                                    <input type="text" class="form-control" id="city-text"
                                           placeholder="Or type exact location"
                                           style="margin-top:6px;">
                                    <small class="text-muted">Use the dropdown or type your exact location above.</small>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <label>Postal code <small class="text-muted">(optional)</small></label>
                                    <input type="text" class="form-control" id="postal_code" placeholder="e.g. 80100">
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-12 text-center" style="margin-top:10px;">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-save"></i> Save changes</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="footer"></div>

<script src="https://js.honeybadger.io/v6/honeybadger.min.js"></script>
	<script src="js/honeybadger-init.js"></script>
	<script src="js/jquery-1.11.0.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/jquery.cookie.js"></script>
<script src="js/modernizr.js"></script>
<script src="js/front.js"></script>
<script src="js/client.js"></script>
<script src="js/customer-account-page.js"></script>

</body>
</html>
